name: Beta Builds

run-name: Beta Builds · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-beta:
    name: Windows Beta
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri debug executable
        run: npm run tauri -w client -- build --debug --no-bundle --ci

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/debug/aerina-client.exe "dist/Aerina-Windows-x64-beta-${GITHUB_RUN_ID}.exe"

      - name: Upload beta executable
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-windows-${{ github.run_id }}
          archive: false
          path: dist/Aerina-Windows-x64-beta-${{ github.run_id }}.exe
          if-no-files-found: error
          retention-days: 14

  linux-beta:
    name: Linux Beta
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri debug binary
        run: npm run tauri -w client -- build --debug --no-bundle --ci

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/debug/aerina-client "dist/Aerina-Linux-x64-beta-${GITHUB_RUN_ID}"

      - name: Upload beta binary
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-linux-${{ github.run_id }}
          archive: false
          path: dist/Aerina-Linux-x64-beta-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 14

  macos-beta:
    name: macOS Beta
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri debug binary
        run: npm run tauri -w client -- build --debug --no-bundle --ci --target universal-apple-darwin

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/universal-apple-darwin/debug/aerina-client "dist/Aerina-macOS-universal-beta-${GITHUB_RUN_ID}"

      - name: Upload beta binary
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-macos-${{ github.run_id }}
          archive: false
          path: dist/Aerina-macOS-universal-beta-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 14
