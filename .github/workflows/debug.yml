name: Beta Builds

run-name: Beta Builds · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  get-version:
    name: Compute Beta Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute version
        id: compute
        shell: bash
        run: |
          BASE_VERSION=$(grep '"version"' apps/client/src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": *"\(.*\)".*/\1/')
          BETA_VERSION="${BASE_VERSION}-${GITHUB_RUN_ID}"
          echo "version=${BETA_VERSION}" >> $GITHUB_OUTPUT
          echo "Beta version: ${BETA_VERSION}"

  windows-beta:
    name: Windows Beta
    runs-on: windows-latest
    needs: get-version
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Patch version
        shell: bash
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" apps/client/src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" apps/client/src-tauri/Cargo.toml

      - name: Build Tauri installers
        run: npm run tauri -w client -- build --ci

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ needs.get-version.outputs.version }}"
          find apps/client/src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.exe" \) | while read -r f; do
            base="$(basename "$f")"
            cp "$f" "dist/Aerina-Windows-x64-${VERSION}-${base}"
          done
          ls -la dist/

      - name: Upload beta installers
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-windows-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  linux-beta:
    name: Linux Beta
    runs-on: ubuntu-22.04
    needs: get-version
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Patch version
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" apps/client/src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" apps/client/src-tauri/Cargo.toml

      - name: Build Tauri installers
        run: npm run tauri -w client -- build --ci

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION="${{ needs.get-version.outputs.version }}"
          find apps/client/src-tauri/target/release/bundle -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) | while read -r f; do
            base="$(basename "$f")"
            cp "$f" "dist/Aerina-Linux-x64-${VERSION}-${base}"
          done
          ls -la dist/

      - name: Upload beta installers
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-linux-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  macos-beta:
    name: macOS Beta
    runs-on: macos-latest
    needs: get-version
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Patch version
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" apps/client/src-tauri/tauri.conf.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" apps/client/src-tauri/Cargo.toml

      - name: Build Tauri installers
        run: npm run tauri -w client -- build --ci --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p dist
          VERSION="${{ needs.get-version.outputs.version }}"
          find apps/client/src-tauri/target/universal-apple-darwin/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" \) | while read -r f; do
            base="$(basename "$f")"
            cp "$f" "dist/Aerina-macOS-universal-${VERSION}-${base}"
          done
          ls -la dist/

      - name: Upload beta installers
        uses: actions/upload-artifact@v7
        with:
          name: aerina-beta-macos-${{ github.run_id }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
