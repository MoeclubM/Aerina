name: Debug Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: debug-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  CARGO_TERM_COLOR: always

jobs:
  windows-debug:
    name: Windows Debug
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri debug executable
        run: npm run tauri -w client -- build --debug --no-bundle --ci

      - name: Upload debug executable
        uses: actions/upload-artifact@v4
        with:
          name: aerina-windows-debug-${{ github.sha }}
          path: target/debug/aerina-client.exe
          if-no-files-found: error
          retention-days: 14
